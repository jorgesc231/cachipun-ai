<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <title>Piedra, Papel o Tijera - IA</title>
    <style>
        body {
            font-family: monospace;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #video-container {
            position: relative;
            margin-bottom: 20px;
            border: 2px solid #4CAF50;
        }
        /* Borde rojo si no hay persona */
        .video-box.no-person { border-color: #f44336 !important; }
        
        video {
            transform: scaleX(-1);
            width: 640px;
            height: 480px;
            display: block;
        }

        .camaras-container {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .video-box {
            border: 2px solid #4CAF50;
            width: 320px;
        }
        .video-box video { width: 100%; display: block; transform: scaleX(-1); }
        .controles-conexion { margin-top: 20px; background: #1e1e1e; padding: 15px; }

        #ui-layer { text-align: center; }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            font-family: monospace;
        }
        button:disabled { background-color: #555; cursor: not-allowed; }
        h1 { margin: 0 0 10px 0; }
        #status { color: #aaaaaa; }
        #gesture-result { font-size: 24px; font-weight: bold; color: #ffeb3b; margin-top: 10px;}
        #human-status { font-size: 18px; font-weight: bold; color: #4CAF50; margin-top: 5px; }
        .alert { color: #f44336 !important; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>Piedra, Papel o Tijera</h1>
        <p id="status">Cargando modelos de IA...</p>
        <div class="camaras-container">
            <div class="video-box">
                <p>Tú</p>
                <video id="webcam" autoplay playsinline muted></video>
            </div>
            
            <div class="video-box">
                <p>Oponente</p>
                <video id="remote-webcam" autoplay playsinline></video>
            </div>
        </div>

        <div class="controles-conexion">
            <p id="status" style="color: #ffeb3b; margin-bottom: 15px;">Conectando a la red...</p>
            
            <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
                <button id="btn-crear">Crear Sala</button>
        
                <span style="margin: 0 15px;"> O </span>
        
                <input 
                    type="text" 
                    id="input-sala" 
                    placeholder="EJ: M4T9X" 
                    maxlength="5" 
                    style="text-transform: uppercase; font-size: 18px; text-align: center; width: 120px;"
                >
                <button id="btn-unirse">Unirse a Sala</button>
            </div>
        </div>
        <div id="human-status">Presencia Humana: Evaluando...</div>
        <div id="gesture-result">Gesto: Ninguno</div>
    </div>

    <script type="module">
        // 1. Importamos GestureRecognizer y FaceDetector
        import {
            GestureRecognizer,
            FaceDetector,
            FilesetResolver
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        const gestureResult = document.getElementById('gesture-result');
        const humanStatus = document.getElementById('human-status');

        let gestureRecognizer;
        let faceDetector;
        let runningMode = "VIDEO";
        let lastVideoTime = -1;
        
        // Variables de estado del juego
        let isPlaying = false;
        let isPersonPresent = false;
        let socket;

        let peer;
        let miPeerID;
        let miStreamLocal;
        // Selecciona dinámicamente la caja que envuelve tu cámara local
        const videoContainer = document.getElementById('webcam').parentElement;
        const videoRemoto = document.getElementById('remote-webcam');
        const textoMiId = document.getElementById('mi-id');
        // 2. Inicializar ambos modelos
        async function initializeAI() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            
            // Cargar modelo de Gestos
            gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                    delegate: "GPU"
                },
                runningMode: runningMode
            });

            // Cargar modelo de Rostros (BlazeFace - muy ligero)
            faceDetector = await FaceDetector.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite",
                    delegate: "GPU"
                },
                runningMode: runningMode
            });

            statusText.innerText = "Modelos cargados. Esperando cámara...";
            enableCamera();
        }

        async function enableCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
            const constraints = { video: { width: 640, height: 480 } };
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                document.getElementById('webcam').srcObject = stream;
                miStreamLocal = stream; // Guardamos el stream para enviarlo después
                video.addEventListener("loadeddata", predictWebcam);
                statusText.innerText = "Cámara lista.";
                // El botón se habilitará solo si se detecta una persona

                // Inicializar la conexión P2P una vez que tenemos cámara
                iniciarPeerJS();
            } catch (err) {
                statusText.innerText = "Error de cámara: " + err;
            }
        }

        function iniciarPeerJS() {
            // Nos conectamos al servidor gratuito de PeerJS
            peer = new Peer(); 

            // Cuando el servidor nos asigna una "matrícula" única
            peer.on('open', (id) => {
                miPeerID = id; // Guardamos el ID largo ("abc-123-xyz")
                conectarWebSocket(); // Ahora que tenemos ID, conectamos al servidor Go
            });

            // CUANDO ALGUIEN NOS LLAMA A NOSOTROS:
            peer.on('call', (llamada) => {
                // 1. Contestamos enviando nuestra propia cámara
                llamada.answer(miStreamLocal);
                
                // 2. Escuchamos para recibir el video del oponente
                llamada.on('stream', (streamDelOponente) => {
                    document.getElementById('remote-webcam').srcObject = streamDelOponente;
                });
            });
        }

        // 2. Conexión con tu backend en Go
        function conectarWebSocket() {
            // Avisamos que el servidor se está despertando
            document.getElementById('status').innerText = "Conectando al servidor central...";
                
            socket = new WebSocket("wss://cachipun-server.fly.dev/ws");
            
            // Este evento se dispara cuando la conexión se abre exitosamente
            socket.onopen = () => {
                document.getElementById('status').innerText = "Sistema en línea. ¡Listo para jugar!";
            };

            socket.onmessage = (evento) => {
                const mensaje = JSON.parse(evento.data);

                if (mensaje.accion === "sala_creada") {
                    // El servidor Go nos dio nuestro código corto de 5 letras
                    document.getElementById('status').innerText = "Comparte este código: " + mensaje.valor;
                } 
                else if (mensaje.accion === "iniciar_llamada") {
                    // Somos el Jugador 2, el servidor Go nos dio el ID largo del Jugador 1
                    const idOponenteLargo = mensaje.valor;
                    llamarOponente(idOponenteLargo);
                }
                else if (mensaje.accion === "estado") {
                    document.getElementById('status').innerText = mensaje.valor;
                    // Si el mensaje incluye "¡Haz tu gesto!", disparas la captura de MediaPipe
                    if (mensaje.valor.includes("¡Haz tu gesto!")) {
                        capturarYEnviarGesto();
                    }
                }
                else if (mensaje.accion === "resultado") {
                    document.getElementById('status').innerText = mensaje.valor;
                }
            };
        }

        // 3. Eventos de los botones de la Interfaz
        document.getElementById('btn-crear').addEventListener('click', () => {

            // Validamos que el servidor de Fly.io esté despierto y conectado
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                document.getElementById('status').innerText = "Espera, el servidor se está despertando...";
                return;
            }
            // Validamos que la cámara (PeerJS) tenga su ID listo
            if (!miPeerID) {
                document.getElementById('status').innerText = "Cargando tu cámara, espera...";
                return;
            }
    
           
            // Le decimos a Go que cree una sala y mapee nuestro PeerID largo
            socket.send(JSON.stringify({ accion: "crear", valor: miPeerID }));
        });

        document.getElementById('btn-unirse').addEventListener('click', () => {
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                    document.getElementById('status').innerText = "Espera, conectando al servidor...";
                    return;
            }
            
            // Le mandamos a Go el código de 5 letras ("A7X9K")
            const codigoIngresado = document.getElementById('input-sala').value.toUpperCase();

            if (codigoIngresado.length !== 5) {
                    alert("El código de la sala debe tener 5 caracteres.");
                    return;
            }
            
            socket.send(JSON.stringify({ accion: "unirse", valor: codigoIngresado }));
        });

        // 4. Función de WebRTC
        function llamarOponente(idLargo) {
            const llamada = peer.call(idLargo, miStreamLocal);
            llamada.on('stream', (streamDelOponente) => {
                document.getElementById('remote-webcam').srcObject = streamDelOponente;
            });
        }

        // 5. Enviar movimiento
        function capturarYEnviarGesto() {
            setTimeout(() => {
                const gestoFinal = ultimoGestoDetectado; // De tu lógica de MediaPipe
                socket.send(JSON.stringify({ accion: "mover", valor: gestoFinal }));
            }, 2000); // Darles 2 segundos para posar la mano
        }

        // 3. Bucle de predicción para Rostros y Gestos
        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const now = Date.now();
                
                // --- DETECCIÓN DE ROSTRO ---
                const faceResults = faceDetector.detectForVideo(video, now);
                isPersonPresent = faceResults.detections.length > 0;

                if (isPersonPresent) {
                    humanStatus.innerText = "Presencia Humana: Detectada ✔️";
                    humanStatus.className = "";
                } else {
                    humanStatus.innerText = "Presencia Humana: No detectada ❌";
                    humanStatus.className = "alert";
                }

                // --- DETECCIÓN DE GESTOS ---
                // Solo procesamos gestos si hay una persona detectada para ahorrar recursos
                if (isPersonPresent) {
                    const gestureResults = gestureRecognizer.recognizeForVideo(video, now);

                    if (gestureResults.gestures.length > 0) {
                        const categoryName = gestureResults.gestures[0][0].categoryName;
                        let gestoTraducido = "Desconocido";
                        if (categoryName === "Closed_Fist") gestoTraducido = "Piedra";
                        if (categoryName === "Open_Palm") gestoTraducido = "Papel";
                        if (categoryName === "Victory") gestoTraducido = "Tijeras";

                        gestureResult.innerText = `Gesto: ${gestoTraducido}`;
                    } else {
                        gestureResult.innerText = "Gesto: Ninguna mano";
                    }
                } else {
                    gestureResult.innerText = "Gesto: Pausado (No hay humano)";
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        initializeAI();
    </script>
</body>
</html>
