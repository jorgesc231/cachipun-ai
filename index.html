<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Piedra, Papel o Tijera - IA & Anti-Bot</title>
    <style>
        body {
            font-family: monospace;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #video-container {
            position: relative;
            margin-bottom: 20px;
            border: 2px solid #4CAF50;
        }
        /* Borde rojo si no hay persona */
        #video-container.no-person {
            border-color: #f44336; 
        }
        video {
            transform: scaleX(-1);
            width: 640px;
            height: 480px;
            display: block;
        }
        #ui-layer { text-align: center; }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            font-family: monospace;
        }
        button:disabled { background-color: #555; cursor: not-allowed; }
        h1 { margin: 0 0 10px 0; }
        #status { color: #aaaaaa; }
        #gesture-result { font-size: 24px; font-weight: bold; color: #ffeb3b; margin-top: 10px;}
        #human-status { font-size: 18px; font-weight: bold; color: #4CAF50; margin-top: 5px; }
        .alert { color: #f44336 !important; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>Piedra, Papel o Tijera</h1>
        <p id="status">Cargando modelos de IA...</p>
        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
        </div>
        <button id="btn-start" disabled>Buscar Partida</button>
        <div id="human-status">Presencia Humana: Evaluando...</div>
        <div id="gesture-result">Gesto: Ninguno</div>
    </div>

    <script type="module">
        // 1. Importamos GestureRecognizer y FaceDetector
        import {
            GestureRecognizer,
            FaceDetector,
            FilesetResolver
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        const btnStart = document.getElementById('btn-start');
        const gestureResult = document.getElementById('gesture-result');
        const humanStatus = document.getElementById('human-status');
        const videoContainer = document.getElementById('video-container');

        let gestureRecognizer;
        let faceDetector;
        let runningMode = "VIDEO";
        let lastVideoTime = -1;
        
        // Variables de estado del juego
        let isPlaying = false;
        let isPersonPresent = false;
        let socket;

        // 2. Inicializar ambos modelos
        async function initializeAI() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            
            // Cargar modelo de Gestos
            gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                    delegate: "GPU"
                },
                runningMode: runningMode
            });

            // Cargar modelo de Rostros (BlazeFace - muy ligero)
            faceDetector = await FaceDetector.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite",
                    delegate: "GPU"
                },
                runningMode: runningMode
            });

            statusText.innerText = "Modelos cargados. Esperando cámara...";
            enableCamera();
        }

        async function enableCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
            const constraints = { video: { width: 640, height: 480 } };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
                statusText.innerText = "Cámara lista.";
                // El botón se habilitará solo si se detecta una persona
            } catch (err) {
                statusText.innerText = "Error de cámara: " + err;
            }
        }

        // 3. Bucle de predicción para Rostros y Gestos
        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const now = Date.now();
                
                // --- DETECCIÓN DE ROSTRO ---
                const faceResults = faceDetector.detectForVideo(video, now);
                isPersonPresent = faceResults.detections.length > 0;

                if (isPersonPresent) {
                    humanStatus.innerText = "Presencia Humana: Detectada ✔️";
                    humanStatus.className = "";
                    videoContainer.classList.remove("no-person");
                    if (!isPlaying && btnStart.innerText === "Buscar Partida") btnStart.disabled = false;
                } else {
                    humanStatus.innerText = "Presencia Humana: No detectada ❌";
                    humanStatus.className = "alert";
                    videoContainer.classList.add("no-person");
                    btnStart.disabled = true; // Bloquear inicio si no hay nadie
                }

                // --- DETECCIÓN DE GESTOS ---
                // Solo procesamos gestos si hay una persona detectada para ahorrar recursos
                if (isPersonPresent) {
                    const gestureResults = gestureRecognizer.recognizeForVideo(video, now);

                    if (gestureResults.gestures.length > 0) {
                        const categoryName = gestureResults.gestures[0][0].categoryName;
                        let gestoTraducido = "Desconocido";
                        if (categoryName === "Closed_Fist") gestoTraducido = "Piedra";
                        if (categoryName === "Open_Palm") gestoTraducido = "Papel";
                        if (categoryName === "Victory") gestoTraducido = "Tijeras";

                        gestureResult.innerText = `Gesto: ${gestoTraducido}`;
                    } else {
                        gestureResult.innerText = "Gesto: Ninguna mano";
                    }
                } else {
                    gestureResult.innerText = "Gesto: Pausado (No hay humano)";
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        // 4. Lógica de conexión con el servidor Go
        btnStart.addEventListener('click', () => {
            if (!isPersonPresent) return; // Validación extra de seguridad

            btnStart.disabled = true;
            statusText.innerText = "Conectando al servidor...";

            socket = new WebSocket("ws://localhost:8080/ws");

            socket.onmessage = (evento) => {
                const datos = JSON.parse(evento.data);

                if (datos.type === "status") {
                    statusText.innerText = datos.value;
                    
                    if (datos.value.includes("¡Haz tu gesto!")) {
                        isPlaying = true;
                        
                        // Validar constantemente si la persona se va durante la cuenta
                        const checkPersonInterval = setInterval(() => {
                            if (!isPersonPresent) {
                                statusText.innerText = "¡Abortado! Persona ausente.";
                                socket.close();
                                clearInterval(checkPersonInterval);
                                isPlaying = false;
                            }
                        }, 100);

                        setTimeout(() => {
                            clearInterval(checkPersonInterval);
                            if (!isPlaying) return; // Si se abortó, no enviar
                            
                            isPlaying = false;
                            const textoGesto = gestureResult.innerText;
                            let gestoFinal = "Desconocido";
                            
                            if(textoGesto.includes("Piedra")) gestoFinal = "Piedra";
                            else if(textoGesto.includes("Papel")) gestoFinal = "Papel";
                            else if(textoGesto.includes("Tijeras")) gestoFinal = "Tijeras";

                            socket.send(JSON.stringify({ type: "move", value: gestoFinal }));
                            statusText.innerText = "Gesto enviado. Esperando...";
                        }, 2000);
                    }
                } else if (datos.type === "result") {
                    statusText.innerText = datos.value;
                    if (isPersonPresent) btnStart.disabled = false;
                    btnStart.innerText = "Jugar de nuevo";
                }
            };

            socket.onerror = () => {
                statusText.innerText = "Error de conexión.";
                if (isPersonPresent) btnStart.disabled = false;
            };
        });

        initializeAI();
    </script>
</body>
</html>
